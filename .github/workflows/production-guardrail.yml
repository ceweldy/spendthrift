name: Production Guardrail

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrail:
    name: Green build gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run guardrail checks
        run: ./scripts/preprod-guardrail.sh
